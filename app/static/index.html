<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hugging Face Rip</title>
<style>
:root{--bg:#0f1115;--card:#171a21;--line:#262b36;--fg:#e6e9ef;--muted:#8b94a7;--accent:#ffb000;--ok:#3fb950;--err:#f85149}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--fg);font:15px/1.5 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
.wrap{max-width:920px;margin:0 auto;padding:36px 20px}
h1{font-size:22px;margin:0 0 4px;letter-spacing:-.01em}
.sub{color:var(--muted);margin:0 0 24px}
code{background:var(--card);padding:1px 6px;border-radius:5px}
form{display:flex;gap:8px;margin-bottom:26px}
input{flex:1;background:var(--card);border:1px solid var(--line);color:var(--fg);padding:11px 13px;border-radius:8px;font-size:15px}
input:focus{outline:none;border-color:var(--accent)}
button{background:var(--accent);color:#1b1b1b;border:0;border-radius:8px;padding:11px 18px;font-weight:600;cursor:pointer}
button.ghost{background:transparent;color:var(--muted);border:1px solid var(--line);padding:6px 11px;font-weight:500}
button.ghost:hover{color:var(--fg);border-color:var(--muted)}
td button.ghost + button.ghost{margin-left:6px}
table{width:100%;border-collapse:collapse}
th{text-align:left;color:var(--muted);font-weight:500;font-size:12px;text-transform:uppercase;letter-spacing:.04em;padding:0 10px 10px}
td{padding:12px 10px;border-top:1px solid var(--line);vertical-align:middle}
.repo{font-weight:600}
.type{color:var(--muted);font-size:13px}
.badge{display:inline-block;margin-top:3px;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;background:var(--line);color:var(--muted)}
.badge.model{background:rgba(88,166,255,.13);color:#58a6ff}
.badge.dataset{background:rgba(63,185,80,.14);color:var(--ok)}
.badge.space{background:rgba(188,140,255,.15);color:#bc8cff}
.bar{height:6px;background:var(--line);border-radius:99px;overflow:hidden;min-width:130px}
.bar>span{display:block;height:100%;background:var(--accent);transition:width .4s ease}
.st{font-size:13px;font-weight:600;text-transform:capitalize}
.st.completed{color:var(--ok)}.st.failed{color:var(--err)}.st.running{color:var(--accent)}.st.queued,.st.cancelled{color:var(--muted)}.st.paused{color:#d2a24c}.st.retrying{color:#d2a24c}.st.verifying{color:#d2a24c}
.vbadge{display:inline-block;margin-left:8px;font-size:11px;font-weight:600;vertical-align:middle}
.vbadge.ok{color:var(--ok)}.vbadge.err{color:var(--err)}.vbadge.muted{color:var(--muted)}
.err{color:var(--err);font-size:12px;margin-top:4px;max-width:420px}
.size{color:var(--muted);font-size:13px;white-space:nowrap}
.empty{color:var(--muted);text-align:center;padding:44px 0}
.storage{display:flex;align-items:center;gap:16px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:13px 16px;margin:0 0 26px}
.storage .slabel{font-size:13px;font-weight:600;white-space:nowrap}
.storage .spath{color:var(--muted);font-weight:400;margin-left:8px}
.storage .sbar{flex:1;display:flex;height:8px;background:var(--line);border-radius:99px;overflow:hidden;min-width:80px}
.storage .sbar>span{display:block;height:100%;transition:width .4s ease}
.storage .sbar .sused{background:var(--accent)}
.storage.full .sbar .sused{background:var(--err)}
.storage .sbar .splanned{background:var(--ok)}
.storage .sbar .splanned.over{background:var(--err)}
.storage .sval{font-size:13px;color:var(--muted);white-space:nowrap}
.storage .sval b{color:var(--fg);font-weight:600}
</style>
</head>
<body>
<div class="wrap">
  <div style="display:flex;align-items:center;justify-content:space-between;gap:12px">
    <h1>Hugging Face Rip</h1>
    <button id="pauseAll" class="ghost" onclick="togglePauseAll()">Pause all</button>
  </div>
  <p class="sub">Paste a repo slug (e.g. <code>bigscience/bloom</code>) to back it up to your local folder.</p>
  <div id="storage" class="storage" hidden></div>
  <form id="f">
    <input id="slug" placeholder="owner/name" autocomplete="off" autofocus />
    <button type="submit">Back up</button>
  </form>
  <table>
    <thead><tr><th>Repo</th><th>Status</th><th>Progress</th><th>Size</th><th></th></tr></thead>
    <tbody id="rows"></tbody>
  </table>
  <div id="empty" class="empty">No backups yet.</div>
</div>
<script>
const fmt = b => {
  if (!b) return "0 B";
  const u = ["B","KB","MB","GB","TB"];
  const i = Math.min(u.length - 1, Math.floor(Math.log(b) / Math.log(1024)));
  return (b / Math.pow(1024, i)).toFixed(i ? 1 : 0) + " " + u[i];
};
const esc = s => String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
// --- aggregate download speed (client-side, display-only) ---
let lastSample = null;     // { at: <ms>, bytes: Map<jobId, downloaded_bytes> }
let smoothedSpeed = null;  // EMA of bytes/sec across running jobs, or null when idle

// Pure: instantaneous aggregate rate (bytes/sec) + the new sample. Sums only
// positive per-job deltas for jobs running in BOTH samples, so a completed or
// deleted job (drops out), a newly started/resumed job (no prior entry), and
// Xet staging re-counts (negative blip) never produce a spurious spike.
function computeSpeed(prevSample, jobs, now) {
  const bytes = new Map();
  for (const j of jobs) {
    if (j.status === "running") bytes.set(j.id, j.downloaded_bytes || 0);
  }
  const sample = { at: now, bytes };
  if (!prevSample || now <= prevSample.at) return { speed: null, sample };
  const elapsed = (now - prevSample.at) / 1000;
  let delta = 0;
  for (const [id, cur] of bytes) {
    const prev = prevSample.bytes.get(id);
    if (prev !== undefined) delta += Math.max(0, cur - prev);
  }
  return { speed: delta / elapsed, sample };
}

// Update state from the latest jobs list; return the smoothed rate to display,
// or null when nothing is downloading / not enough data yet.
function updateSpeed(jobs) {
  const running = jobs.some(j => j.status === "running");
  const { speed, sample } = computeSpeed(lastSample, jobs, Date.now());
  lastSample = sample;
  if (!running) { smoothedSpeed = null; lastSample = null; return null; }   // idle -> fully reset, start fresh next run
  if (speed === null) return smoothedSpeed;              // first sample of this run (stays null)
  smoothedSpeed = smoothedSpeed === null ? speed : 0.3 * speed + 0.7 * smoothedSpeed;
  return smoothedSpeed;
}

async function api(path, opts) {
  const r = await fetch(path, opts);
  if (!r.ok) {
    const e = await r.json().catch(() => ({ detail: r.statusText }));
    throw new Error(e.detail || "request failed");
  }
  return r.json();
}
document.getElementById("f").addEventListener("submit", async e => {
  e.preventDefault();
  const el = document.getElementById("slug");
  const slug = el.value.trim();
  if (!slug) return;
  try {
    await api("/api/jobs", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ slug }) });
    el.value = "";
    refresh();
  } catch (err) { alert(err.message); }
});
async function act(id, what) {
  try { await api(`/api/jobs/${id}/${what}`, { method: "POST" }); refresh(); }
  catch (e) { alert(e.message); }
}
window.act = act;
function confirmDelete(id, slug, bytes) {
  if (!confirm(`Delete ${slug} and its downloaded files (${fmt(bytes)})? This frees disk space and cannot be undone.`)) return;
  act(id, "delete");
}
window.confirmDelete = confirmDelete;
function confirmCancel(id, slug, bytes) {
  if (!confirm(`Stop and discard ${slug} (${fmt(bytes)} downloaded)? This frees disk space and cannot be undone.`)) return;
  act(id, "cancel");
}
window.confirmCancel = confirmCancel;
let pausedAll = false;
async function togglePauseAll() {
  try {
    await api(pausedAll ? "/api/resume-all" : "/api/pause-all", { method: "POST" });
    refresh();
  } catch (e) { alert(e.message); }
}
window.togglePauseAll = togglePauseAll;
function retryText(j) {
  let s = `retrying · ${j.retry_count}/5`;
  if (j.next_retry_at) {
    const due = new Date(j.next_retry_at.replace(" ", "T") + "Z").getTime();
    const secs = Math.round((due - Date.now()) / 1000);
    s += secs > 0 ? ` · next in ${secs}s` : " · due";
  }
  return s;
}
function verifyBadge(j) {
  if (j.status !== "completed") return "";
  if (j.verify_status === "verified") return `<span class="vbadge ok">✓ verified</span>`;
  if (j.verify_status === "corrupted") return `<span class="vbadge err">⚠ corrupted</span>`;
  let note = "";
  try { const d = JSON.parse(j.verify_detail || "null"); if (d && d.note) note = ` · ${esc(d.note)}`; }
  catch (e) {}
  return `<span class="vbadge muted">unverified${note}</span>`;
}
function verifyFailures(j) {
  if (j.verify_status !== "corrupted") return "";
  let items = "", n = 0;
  try {
    const d = JSON.parse(j.verify_detail || "null");
    const fs = (d && d.failures) || [];
    n = fs.length;
    items = fs.slice(0, 8).map(f => `${esc(f.file)} (${esc(f.reason)})`).join("<br>");
    if (n > 8) items += `<br>…and ${n - 8} more`;
  } catch (e) {}
  return `<div class="err">⚠ integrity check failed${items ? `:<br>${items}` : ""}</div>`;
}
function confirmRedownload(id, slug) {
  if (!confirm(`Re-download ${slug}? This deletes the current (corrupted) files and downloads them again.`)) return;
  act(id, "redownload");
}
window.confirmRedownload = confirmRedownload;
function row(j) {
  const actions =
      j.status === "running"
    ? `<button class="ghost" onclick="act(${j.id},'pause')">Pause</button>`
      + `<button class="ghost" onclick="confirmCancel(${j.id},'${esc(j.slug)}',${j.downloaded_bytes})">Cancel</button>`
    : j.status === "verifying"
    ? `<button class="ghost" onclick="act(${j.id},'stop-verify')">Stop</button>`
    : j.status === "paused"
    ? `<button class="ghost" onclick="act(${j.id},'resume')">Resume</button>`
      + `<button class="ghost" onclick="confirmCancel(${j.id},'${esc(j.slug)}',${j.downloaded_bytes})">Cancel</button>`
    : j.status === "retrying"
    ? `<button class="ghost" onclick="confirmCancel(${j.id},'${esc(j.slug)}',${j.downloaded_bytes})">Cancel</button>`
    : j.status === "failed"
    ? `<button class="ghost" onclick="act(${j.id},'retry')">Retry</button>`
    : j.status === "queued"
    ? `<button class="ghost" onclick="act(${j.id},'cancel')">Cancel</button>`
    : j.status === "completed"
    ? (j.verify_status === "corrupted"
        ? `<button class="ghost" onclick="confirmRedownload(${j.id},'${esc(j.slug)}')">Re-download</button>`
          + `<button class="ghost" onclick="confirmDelete(${j.id},'${esc(j.slug)}',${j.total_bytes})">Delete</button>`
        : `<button class="ghost" onclick="act(${j.id},'verify')">Verify</button>`
          + `<button class="ghost" onclick="confirmDelete(${j.id},'${esc(j.slug)}',${j.total_bytes})">Delete</button>`)
    : "";
  const label = j.status === "queued" && pausedAll ? "held"
              : j.status === "retrying" ? retryText(j)
              : j.status;
  return `<tr>
    <td><div class="repo">${esc(j.slug)}</div><span class="badge ${esc(j.repo_type)}">${esc(j.repo_type)}</span>${j.error ? `<div class="err">${esc(j.error)}</div>` : ""}${verifyFailures(j)}</td>
    <td><span class="st ${esc(j.status)}">${esc(label)}</span>${verifyBadge(j)}</td>
    <td><div class="bar"><span style="width:${j.percent}%"></span></div><div class="type">${j.percent}%</div></td>
    <td class="size">${fmt(j.downloaded_bytes)} / ${fmt(j.total_bytes)}</td>
    <td>${actions}</td></tr>`;
}
async function loadStorage(speed) {
  try {
    const s = await api("/api/storage");
    const total = s.total || 0;
    const planned = s.planned || 0;
    pausedAll = !!s.paused_all;
    const pa = document.getElementById("pauseAll");
    if (pa) pa.textContent = pausedAll ? "Resume all" : "Pause all";
    const usedPct = total ? Math.min(100, (s.used / total) * 100) : 0;
    const over = s.used + planned > total;                 // projected usage won't fit
    const plannedPct = total ? Math.max(0, Math.min((planned / total) * 100, 100 - usedPct)) : 0;
    const el = document.getElementById("storage");
    el.classList.toggle("full", usedPct >= 90);
    const plannedTxt = planned
      ? ` · <span style="color:${over ? "var(--err)" : "var(--ok)"}">+${fmt(planned)} planned${over ? ` · ⚠ ${fmt(s.used + planned - total)} over` : ""}</span>`
      : "";
    const speedTxt = speed != null
      ? ` · <span style="color:var(--accent)">↓ ${fmt(Math.round(speed))}/s</span>`
      : "";
    el.innerHTML =
      `<div class="slabel">Backup disk<span class="spath">${esc(s.path)}</span></div>` +
      `<div class="sbar"><span class="sused" style="width:${usedPct}%"></span><span class="splanned${over ? " over" : ""}" style="width:${plannedPct}%"></span></div>` +
      `<div class="sval"><b>${fmt(s.used)}</b> / ${fmt(s.total)} used · ${fmt(s.free)} free${plannedTxt}${speedTxt}</div>`;
    el.hidden = false;
  } catch (e) { /* transient; keep polling */ }
}
async function refresh() {
  let speed = null;
  try {
    const { jobs } = await api("/api/jobs");
    speed = updateSpeed(jobs);
    document.getElementById("rows").innerHTML = jobs.map(row).join("");
    document.getElementById("empty").style.display = jobs.length ? "none" : "block";
  } catch (e) { /* transient; keep polling */ }
  loadStorage(speed);
}
refresh();
setInterval(refresh, 1500);
</script>
</body>
</html>
